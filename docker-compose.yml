version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: ai-feedback-redis
    restart: always
    volumes:
      - redis_data:/data

  backend:
    build: ./backend
    container_name: ai-feedback-backend
    restart: always
    environment:
      - NODE_ENV=production
      - APP_PORT=3000
      - TYPEORM_SYNCHRONIZE=true
      - DB_TYPE=sqlite
      - DB_LOCATION=./data/db.sqlite
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # TODO: 部署后请改为你的服务器公网 IP 或域名，例如 http://1.2.3.4
      - FRONTEND_URL=http://localhost
    volumes:
      - backend_data:/app/data
      - backend_uploads:/app/uploads
      - ./backend/.env:/app/.env:ro
    depends_on:
      - redis

  frontend:
    build: ./frontend
    container_name: ai-feedback-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  redis_data:
  backend_data:
  backend_uploads:
